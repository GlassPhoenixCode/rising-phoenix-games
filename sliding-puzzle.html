<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Puzzle — Rising Phoenix Games</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IM Fell English', Georgia, serif;
      color: #e8dfc8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page-wrapper {
      width: 100%;
      max-width: 820px;
      padding: 0 16px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    /* Header */
    .game-header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 0 18px;
    }
    .header-inner {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 14px;
    }
    a.rpg-back {
      position: absolute;
      left: 0;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c8952a;
      text-decoration: none;
      transition: color 0.2s;
    }
    a.rpg-back::before { content: '← '; }
    a.rpg-back:hover { color: #f0d080; }
    .logo-img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(200,149,42,0.55));
    }
    h1.rpg-title {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      background: linear-gradient(135deg, #f0d080 0%, #c8952a 50%, #f0d080 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      letter-spacing: 0.04em;
      margin: 0;
      line-height: 1.2;
    }
    .rpg-subtitle {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      color: #a09070;
      font-size: 0.95rem;
      text-align: center;
      margin-top: 4px;
    }
    hr.rpg-rule {
      width: 80%;
      max-width: 400px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,149,42,0.5), transparent);
      margin: 14px auto 0;
      border: none;
    }
    /* Status bar */
    .rpg-statusbar {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: #c8952a;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border: 1px solid rgba(200,149,42,0.25);
      border-radius: 4px;
      background: rgba(15,12,7,0.6);
      margin-top: 14px;
      min-width: 260px;
      justify-content: center;
    }
    .rpg-statusbar::before { content: '⚜'; }
    /* Main */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
      margin-top: 18px;
    }
    /* Size buttons */
    .size-selector { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .controls-divider {
      width: 1px;
      height: 28px;
      background: rgba(200,149,42,0.25);
      align-self: center;
      margin: 0 4px;
    }
    .size-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c8952a;
      background: transparent;
      border: 1px solid rgba(200,149,42,0.3);
      padding: 6px 18px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .size-btn:hover, .size-btn.active {
      border-color: #c8952a;
      background: rgba(200,149,42,0.12);
      box-shadow: 0 0 10px rgba(200,149,42,0.2);
      color: #f0d080;
    }
    /* Image selector */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(200,170,100,0.45);
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 500px;
      justify-content: center;
    }
    .section-label::before, .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(200,149,42,0.2);
    }
    .image-selector { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .img-thumb {
      width: 52px;
      height: 52px;
      border: 1px solid rgba(200,149,42,0.25);
      border-radius: 3px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.2s;
      opacity: 0.65;
    }
    .img-thumb:hover, .img-thumb.active {
      border-color: rgba(200,149,42,0.75);
      opacity: 1;
      box-shadow: 0 0 12px rgba(200,149,42,0.35);
    }
    .img-thumb canvas { display: block; width: 52px; height: 52px; }
    .img-thumb-upload {
      width: 52px;
      height: 52px;
      border: 1px dashed rgba(200,149,42,0.4);
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: all 0.2s;
      opacity: 0.65;
      background: rgba(200,149,42,0.04);
    }
    .img-thumb-upload:hover {
      border-color: rgba(200,149,42,0.75);
      opacity: 1;
      box-shadow: 0 0 12px rgba(200,149,42,0.25);
      background: rgba(200,149,42,0.08);
    }
    .img-thumb-upload.active {
      border-color: rgba(200,149,42,0.75);
      border-style: solid;
      opacity: 1;
      box-shadow: 0 0 12px rgba(200,149,42,0.35);
    }
    .img-thumb-upload .upload-icon {
      font-size: 18px;
      line-height: 1;
      color: #c8952a;
    }
    .img-thumb-upload .upload-label {
      font-family: 'Cinzel', serif;
      font-size: 0.42rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a09070;
      text-align: center;
      line-height: 1.2;
    }
    .img-thumb-upload.has-image .upload-icon { display: none; }
    .img-thumb-upload.has-image .upload-label { display: none; }
    .img-thumb-upload canvas { display: none; width: 52px; height: 52px; }
    .img-thumb-upload.has-image canvas { display: block; }
    /* Preview */
    .preview-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .preview-label {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #a09070;
      text-align: center;
    }
    #preview-canvas {
      border: 1px solid rgba(200,149,42,0.35);
      border-radius: 3px;
      display: block;
    }
    /* Puzzle frame */
    .puzzle-frame {
      position: relative;
      padding: 14px;
      background: radial-gradient(ellipse at center, rgba(40,28,8,0.9) 0%, rgba(20,14,4,0.98) 100%);
      border: 1px solid rgba(200,149,42,0.35);
      border-radius: 6px;
      box-shadow: 0 0 0 1px rgba(200,149,42,0.08), 0 0 30px rgba(200,149,42,0.12),
                  inset 0 1px 0 rgba(200,149,42,0.15), inset 0 0 40px rgba(0,0,0,0.4);
    }
    .puzzle-frame::before, .puzzle-frame::after {
      content: '◆';
      position: absolute;
      color: rgba(200,149,42,0.45);
      font-size: 10px;
      line-height: 1;
    }
    .puzzle-frame::before { top: 5px; left: 8px; }
    .puzzle-frame::after  { bottom: 5px; right: 8px; }
    /* Board */
    #board {
      display: grid;
      gap: 3px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(200,149,42,0.2);
      border-radius: 3px;
      padding: 3px;
      position: relative;
    }
    /* Tiles */
    .tile {
      position: relative;
      cursor: pointer;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid rgba(200,149,42,0.22);
      background: rgba(26,16,5,0.9);
      transition: transform 0.12s ease, box-shadow 0.15s ease;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tile canvas { display: block; position: absolute; inset: 0; }
    .tile:not(.empty):hover {
      border-color: rgba(200,149,42,0.65);
      box-shadow: 0 0 14px rgba(200,149,42,0.3), 0 0 4px rgba(200,149,42,0.15);
      transform: scale(1.035);
      z-index: 2;
    }
    .tile:not(.empty):active { transform: scale(0.97); }
    .tile.empty {
      cursor: default;
      background: rgba(8,5,1,0.8);
      border-color: rgba(200,149,42,0.07);
      box-shadow: inset 0 0 24px rgba(0,0,0,0.7);
    }
    /* shine overlay via pseudo - applied on non-empty tiles */
    .tile:not(.empty)::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,rgba(200,149,42,0.07) 0%,transparent 45%,rgba(200,149,42,0.04) 100%);
      pointer-events: none;
      z-index: 1;
    }
    .tile-num {
      position: absolute;
      bottom: 3px;
      right: 5px;
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      color: rgba(240,208,128,0.5);
      pointer-events: none;
      z-index: 2;
      line-height: 1;
    }
    @keyframes breathe {
      0%,100% { transform: scale(1) translateY(0); }
      50%      { transform: scale(1.02) translateY(-1px); }
    }
    /* Win overlay */
    .win-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,7,2,0.88);
      border-radius: 3px;
      z-index: 50;
      gap: 14px;
    }
    .win-overlay.visible {
      display: flex;
      animation: fadeInWin 0.4s ease;
    }
    @keyframes fadeInWin {
      from { opacity:0; transform:scale(0.95); }
      to   { opacity:1; transform:scale(1); }
    }
    .win-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      background: linear-gradient(135deg,#f0d080,#c8952a,#f0d080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      animation: goldPulse 2s ease-in-out infinite;
    }
    @keyframes goldPulse {
      0%,100%{ filter: drop-shadow(0 0 5px rgba(200,149,42,0.4)); }
      50%    { filter: drop-shadow(0 0 16px rgba(200,149,42,0.9)); }
    }
    .win-moves {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: #c8a878;
      font-size: 1rem;
      text-align: center;
    }
    /* Buttons */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .rpg-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f0d080;
      background: linear-gradient(180deg,rgba(40,28,8,0.9) 0%,rgba(20,14,4,0.95) 100%);
      border: 1px solid rgba(200,149,42,0.45);
      padding: 10px 22px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 1px 0 rgba(200,149,42,0.15),inset 0 1px 0 rgba(200,149,42,0.1);
    }
    .rpg-btn:hover {
      border-color: rgba(200,149,42,0.75);
      box-shadow: 0 0 18px 2px rgba(200,149,42,0.25),0 0 48px 8px rgba(180,120,20,0.15),inset 0 1px 0 rgba(200,149,42,0.2);
      color: #f8e898;
    }
    .rpg-btn:active { transform: scale(0.97); }
    /* Stats */
    .move-display {
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      color: #a09070;
      letter-spacing: 0.08em;
      text-align: center;
    }
    .move-display span { color: #f0d080; font-weight: 600; }
    /* Footer */
    .rpg-footer {
      margin-top: 48px;
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 0.78rem;
      color: rgba(200,170,100,0.45);
      text-align: center;
      line-height: 1.8;
    }
    @media (max-width: 480px) {
      .puzzle-frame { padding: 8px; }
      #board { gap: 2px; padding: 2px; }
    }
  </style>
</head>

    <h1 class="rpg-title">The Glass Puzzle</h1>
    <p class="rpg-subtitle">Restore the shattered masterpiece, piece by piece</p>
    <hr class="rpg-rule">
    <div class="rpg-statusbar" id="status-bar">Awaiting your first move</div>
  </header>

  <main class="main-content">

    <div class="puzzle-frame">
      <div id="board"></div>
      <div class="win-overlay" id="win-overlay">
        <div class="win-title">✶ Masterpiece Restored ✶</div>
        <div class="win-moves" id="win-moves"></div>
        <button class="rpg-btn" id="btn-win-new">Shuffle Again</button>
      </div>
    </div>

    <div class="controls">
      <div class="size-selector" id="size-selector">
        <button class="size-btn active" data-size="3">3 × 3</button>
        <button class="size-btn"        data-size="4">4 × 4</button>
        <button class="size-btn"        data-size="5">5 × 5</button>
      </div>
      <div class="controls-divider"></div>
      <button class="rpg-btn" id="btn-shuffle">Shuffle</button>
      <button class="rpg-btn" id="btn-hint">Hint</button>
    </div>

    <div class="move-display">
      Moves: <span id="move-count">0</span>
      &nbsp;|&nbsp;
      Best: <span id="best-count">—</span>
    </div>

    <div class="section-label">Choose your image</div>
    <div class="image-selector" id="img-selector"></div>

    <div class="preview-row">

// ================================================================
//  GLASS PUZZLE — Rising Phoenix Games
//  All functions on window scope (no IIFE) so onclick attrs work.
// ================================================================

// ---- Image palettes drawn on canvas (no external URLs) ---------
// Each "image" is defined as a canvas drawing function
var IMAGES = [
  {
    label: "Phoenix",
    draw: function(ctx, w, h) {
      // Rich flame gradient — gold / amber / deep red
      var g = ctx.createRadialGradient(w*0.5, h*0.55, h*0.05, w*0.5, h*0.5, h*0.7);
      g.addColorStop(0,   "#fff0a0");
      g.addColorStop(0.25,"#f0c040");
      g.addColorStop(0.5, "#c8752a");
      g.addColorStop(0.75,"#8b2000");
      g.addColorStop(1,   "#1a0800");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
      // Wing sweep left
      ctx.save();
      ctx.globalAlpha = 0.55;
      var wl = ctx.createLinearGradient(0,0,w*0.5,h);
      wl.addColorStop(0,"#ffd060");
      wl.addColorStop(1,"transparent");
      ctx.fillStyle = wl;
      ctx.beginPath();
      ctx.moveTo(w*0.5,h*0.3);
      ctx.bezierCurveTo(w*0.25,h*0.1, 0,h*0.3, w*0.05,h*0.7);
      ctx.bezierCurveTo(w*0.2,h*0.55, w*0.35,h*0.45, w*0.5,h*0.55);
      ctx.fill();
      // Wing sweep right
      var wr = ctx.createLinearGradient(w,0,w*0.5,h);
      wr.addColorStop(0,"#ffd060");
      wr.addColorStop(1,"transparent");
      ctx.fillStyle = wr;
      ctx.beginPath();
      ctx.moveTo(w*0.5,h*0.3);
      ctx.bezierCurveTo(w*0.75,h*0.1, w,h*0.3, w*0.95,h*0.7);
      ctx.bezierCurveTo(w*0.8,h*0.55, w*0.65,h*0.45, w*0.5,h*0.55);
      ctx.fill();
      ctx.restore();
      // Body
      ctx.save();
      ctx.globalAlpha = 0.8;
      var gb = ctx.createRadialGradient(w*0.5,h*0.55,h*0.05, w*0.5,h*0.6,h*0.25);
      gb.addColorStop(0,"#ffe080");
      gb.addColorStop(1,"#c87020");
      ctx.fillStyle = gb;
      ctx.beginPath();
      ctx.ellipse(w*0.5, h*0.58, w*0.12, h*0.22, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  },
  {
    label: "Stained Glass",
    draw: function(ctx, w, h) {
      // Abstract geometric stained-glass look
      var colors = [
        "#1a3a6e","#8b1a1a","#1a5c1a","#7a5a00",
        "#2a1a5e","#5c1a1a","#1a4a3a","#6e3a00",
        "#0a2a5e","#3a0a0a","#0a3a2a","#4e2a00"
      ];
      var cols = 4, rows = 3;
      var cw = w/cols, ch = h/rows;
      var ci = 0;
      for (var r=0; r<rows; r++) {
        for (var c=0; c<cols; c++) {
          ctx.fillStyle = colors[ci % colors.length];
          ctx.fillRect(c*cw+1, r*ch+1, cw-2, ch-2);
          // Leading (black border)
          ctx.strokeStyle = "#000";
          ctx.lineWidth = 2;
          ctx.strokeRect(c*cw+1, r*ch+1, cw-2, ch-2);
          // Inner highlight
          var hg = ctx.createRadialGradient(
            c*cw+cw*0.4, r*ch+ch*0.35, 2,
            c*cw+cw*0.5, r*ch+ch*0.5, cw*0.6
          );
          hg.addColorStop(0,"rgba(255,240,180,0.35)");
          hg.addColorStop(1,"transparent");
          ctx.fillStyle = hg;
          ctx.fillRect(c*cw+1, r*ch+1, cw-2, ch-2);
          ci++;
        }
      }
      // Cross-hatch leading lines
      ctx.strokeStyle = "rgba(0,0,0,0.7)";
      ctx.lineWidth = 3;
      for (var i=1; i<cols; i++) {
        ctx.beginPath(); ctx.moveTo(i*cw,0); ctx.lineTo(i*cw,h); ctx.stroke();
      }
      for (var i=1; i<rows; i++) {
        ctx.beginPath(); ctx.moveTo(0,i*ch); ctx.lineTo(w,i*ch); ctx.stroke();
      }
    }
  },
  {
    label: "Aurora",
    draw: function(ctx, w, h) {
      // Night sky aurora borealis
      var sky = ctx.createLinearGradient(0,0,0,h);
      sky.addColorStop(0,"#000810");
      sky.addColorStop(0.4,"#001220");
      sky.addColorStop(1,"#000508");
      ctx.fillStyle = sky;
      ctx.fillRect(0,0,w,h);
      // Aurora bands
      var bands = [
        {y:0.25,c1:"rgba(0,200,120,0.45)",c2:"rgba(0,80,200,0.3)"},
        {y:0.45,c1:"rgba(120,0,200,0.3)", c2:"rgba(0,180,100,0.2)"},
        {y:0.15,c1:"rgba(0,160,220,0.25)",c2:"rgba(80,0,180,0.2)"}
      ];
      bands.forEach(function(b) {
        var ag = ctx.createLinearGradient(0, b.y*h-h*0.15, 0, b.y*h+h*0.2);
        ag.addColorStop(0,"transparent");
        ag.addColorStop(0.4,b.c1);
        ag.addColorStop(0.7,b.c2);
        ag.addColorStop(1,"transparent");
        ctx.fillStyle = ag;
        // Wavy shape
        ctx.beginPath();
        ctx.moveTo(0, b.y*h);
        ctx.bezierCurveTo(w*0.25,(b.y-0.06)*h, w*0.5,(b.y+0.06)*h, w*0.75,(b.y-0.04)*h);
        ctx.bezierCurveTo(w*0.875,(b.y-0.01)*h, w,(b.y+0.05)*h, w,(b.y+0.2)*h);
        ctx.lineTo(0,(b.y+0.2)*h);
        ctx.fill();
      });
      // Stars
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      var stars = [[0.1,0.08],[0.3,0.05],[0.6,0.12],[0.8,0.04],[0.15,0.18],
                   [0.45,0.09],[0.7,0.16],[0.9,0.07],[0.25,0.22],[0.55,0.02]];
      stars.forEach(function(s) {
        ctx.beginPath();
        ctx.arc(s[0]*w, s[1]*h, 0.8, 0, Math.PI*2);
        ctx.fill();
      });
    }
  },
  {
    label: "Phoenix Art",
    draw: function(ctx, w, h) {
      if (phoenixArtImg && phoenixArtImg.complete) {
        // Centre-crop to square then draw
        var iw = phoenixArtImg.naturalWidth, ih = phoenixArtImg.naturalHeight;
        var side = Math.min(iw, ih);
        var sx = (iw - side) / 2, sy = (ih - side) / 2;
        ctx.drawImage(phoenixArtImg, sx, sy, side, side, 0, 0, w, h);
      } else {
        // Fallback while loading
        var g = ctx.createRadialGradient(w*0.5,h*0.4,0,w*0.5,h*0.5,w*0.7);
        g.addColorStop(0,"#ffe080"); g.addColorStop(0.4,"#c84010"); g.addColorStop(1,"#1a0808");
        ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
      }
    }
  },
  {
    label: "Peacock",
    draw: function(ctx, w, h) {
      // Deep teal/indigo base with rich peacock-feather jewel tones
      var bg = ctx.createRadialGradient(w*0.4, h*0.35, 0, w*0.5, h*0.5, w*0.85);
      bg.addColorStop(0,   "#0d3a3a");
      bg.addColorStop(0.4, "#0a2040");
      bg.addColorStop(0.75,"#1a0a30");
      bg.addColorStop(1,   "#060510");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      // Feather eye rings — concentric jewel circles scattered across canvas
      var eyes = [
        {x:0.25,y:0.28,r:0.22},
        {x:0.72,y:0.22,r:0.18},
        {x:0.15,y:0.72,r:0.17},
        {x:0.62,y:0.68,r:0.20},
        {x:0.88,y:0.50,r:0.15},
        {x:0.42,y:0.50,r:0.13}
      ];
      eyes.forEach(function(e) {
        var cx = e.x*w, cy = e.y*h, maxR = e.r*Math.min(w,h);
        // Outer glow
        var glow = ctx.createRadialGradient(cx,cy,maxR*0.5,cx,cy,maxR*1.4);
        glow.addColorStop(0,"rgba(0,200,180,0.18)");
        glow.addColorStop(1,"transparent");
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(cx,cy,maxR*1.4,0,Math.PI*2); ctx.fill();

        // Ring 1 — deep teal
        ctx.beginPath(); ctx.arc(cx,cy,maxR,0,Math.PI*2);
        ctx.strokeStyle="rgba(0,160,140,0.55)"; ctx.lineWidth=maxR*0.28; ctx.stroke();
        // Ring 2 — cobalt blue
        ctx.beginPath(); ctx.arc(cx,cy,maxR*0.72,0,Math.PI*2);
        ctx.strokeStyle="rgba(30,80,220,0.65)"; ctx.lineWidth=maxR*0.22; ctx.stroke();
        // Ring 3 — vivid green
        ctx.beginPath(); ctx.arc(cx,cy,maxR*0.48,0,Math.PI*2);
        ctx.strokeStyle="rgba(20,180,80,0.7)"; ctx.lineWidth=maxR*0.18; ctx.stroke();
        // Ring 4 — gold
        ctx.beginPath(); ctx.arc(cx,cy,maxR*0.26,0,Math.PI*2);
        ctx.strokeStyle="rgba(220,170,30,0.85)"; ctx.lineWidth=maxR*0.14; ctx.stroke();
        // Centre pupil — deep indigo
        ctx.beginPath(); ctx.arc(cx,cy,maxR*0.10,0,Math.PI*2);
        ctx.fillStyle="rgba(10,5,40,0.95)"; ctx.fill();
        // Centre shimmer
        ctx.beginPath(); ctx.arc(cx,cy,maxR*0.04,0,Math.PI*2);
        ctx.fillStyle="rgba(180,230,255,0.9)"; ctx.fill();
      });

      // Iridescent sweep lines — barbs of the feather
      ctx.save();
      ctx.globalAlpha = 0.22;
      var sweeps = [
        {x1:0,y1:0,    x2:w,  y2:h,   c:"rgba(0,220,200,1)"},
        {x1:w,y1:0,    x2:0,  y2:h,   c:"rgba(60,100,255,1)"},
        {x1:0,y1:h*0.5,x2:w,  y2:h*0.5,c:"rgba(0,180,80,1)"},
        {x1:w*0.5,y1:0,x2:w*0.5,y2:h, c:"rgba(180,120,255,1)"}
      ];
      sweeps.forEach(function(s) {
        var lg = ctx.createLinearGradient(s.x1,s.y1,s.x2,s.y2);
        lg.addColorStop(0,"transparent");
        lg.addColorStop(0.5,s.c);
        lg.addColorStop(1,"transparent");
        ctx.strokeStyle = lg;
        ctx.lineWidth = 1;
        for (var i = -20; i < 30; i++) {
          ctx.beginPath();
          ctx.moveTo(s.x1 + i*(w/18), s.y1);
          ctx.lineTo(s.x2 + i*(w/18), s.y2);
          ctx.stroke();
        }
      });
      ctx.restore();

      // Purple-magenta vignette edge
      var vig = ctx.createRadialGradient(w*0.5,h*0.5,Math.min(w,h)*0.3, w*0.5,h*0.5,Math.min(w,h)*0.85);
      vig.addColorStop(0,"transparent");
      vig.addColorStop(1,"rgba(60,0,80,0.55)");
      ctx.fillStyle = vig;
      ctx.fillRect(0,0,w,h);
    }
  }
];

      var side = Math.min(iw, ih);
      var sx = (iw - side) / 2, sy = (ih - side) / 2;
      uctx.drawImage(userImage, sx, sy, side, side, 0, 0, 600, 600);
    }
    return uc;
  }
  if (offscreenCanvases[imgIdx]) return offscreenCanvases[imgIdx];
  var c = document.createElement("canvas");
  c.width = 600; c.height = 600;
  IMAGES[imgIdx].draw(c.getContext("2d"), 600, 600);
  offscreenCanvases[imgIdx] = c;
  return c;
}

// ---- Draw preview ------------------------------------------
function drawPreview() {
  var c = document.getElementById("preview-canvas");
  var ctx = c.getContext("2d");
  var src = getOffscreen(currentImage);
  ctx.drawImage(src, 0, 0, src.width, src.height, 0, 0, c.width, c.height);
  // Gold border overlay
  ctx.strokeStyle = "rgba(200,149,42,0.5)";
  ctx.lineWidth = 2;
  ctx.strokeRect(1,1,c.width-2,c.height-2);
}

// ---- Guaranteed solvable shuffle (walk from solved) ---------
function solvableShuffle() {
  var total = SIZE * SIZE;
  // Build solved: positions 1..(total-1) then 0 (empty) at end
  var arr = [];
  for (var i = 1; i < total; i++) arr.push(i);
  arr.push(0);
  var eIdx = total - 1;
  var lastMoved = -1;
  var steps = SIZE * SIZE * 30;
  for (var s = 0; s < steps; s++) {
    var nb = getNeighborIndices(eIdx, SIZE);
    var valid = nb.filter(function(x){ return x !== lastMoved; });
    var pick = valid[Math.floor(Math.random() * valid.length)];
    arr[eIdx] = arr[pick];
    arr[pick] = 0;
    lastMoved = eIdx;
    eIdx = pick;
  }
  return { arr: arr, eIdx: eIdx };
}

function getNeighborIndices(idx, sz) {
  var s = sz || SIZE;
  var row = Math.floor(idx / s);
  var col = idx % s;
  var nb = [];
  if (row > 0)     nb.push(idx - s);
  if (row < s - 1) nb.push(idx + s);
  if (col > 0)     nb.push(idx - 1);
  if (col < s - 1) nb.push(idx + 1);
  return nb;
}

// ---- Tile pixel size ----------------------------------------
function getTileSize() {
  var maxPx = Math.min(window.innerWidth - 72, 420);
  return Math.floor((maxPx - (SIZE + 1) * 3) / SIZE);
}

// ---- Render board -------------------------------------------
function render() {
  var board = document.getElementById("board");
  board.innerHTML = "";
  var ts = getTileSize();
  var boardPx = ts * SIZE + (SIZE + 1) * 3;
  board.style.gridTemplateColumns = "repeat(" + SIZE + ", " + ts + "px)";
  board.style.gridTemplateRows    = "repeat(" + SIZE + ", " + ts + "px)";
  board.style.width  = boardPx + "px";
  board.style.height = boardPx + "px";

  var src = getOffscreen(currentImage);

  for (var i = 0; i < TILES.length; i++) {
    var val = TILES[i];
    var tile = document.createElement("div");
    tile.className = "tile" + (val === 0 ? " empty" : "");
    tile.style.width  = ts + "px";
    tile.style.height = ts + "px";

    if (val !== 0) {
      // val is 1-based: tile 1 goes in solved position 0, tile 2 in position 1, etc.
      var solvedPos = val - 1;
      var solvedRow = Math.floor(solvedPos / SIZE);
      var solvedCol = solvedPos % SIZE;

      var tc = document.createElement("canvas");
      tc.width = ts;
      tc.height = ts;
      var tctx = tc.getContext("2d");
      // Draw the slice of the source image that belongs to this tile
      tctx.drawImage(
        src,
        solvedCol * (src.width / SIZE),   // sx
        solvedRow * (src.height / SIZE),  // sy
        src.width / SIZE,                 // sw
        src.height / SIZE,                // sh
        0, 0, ts, ts                      // destination
      );
      tile.appendChild(tc);

      // Number label
      var num = document.createElement("div");
      num.className = "tile-num";
      num.textContent = val;
      tile.appendChild(num);

      // Breathing animation
      var period = (3.6 + Math.random() * 2.2).toFixed(2);
      var delay  = (-Math.random() * parseFloat(period)).toFixed(2);
      tile.style.animation = "breathe " + period + "s " + delay + "s ease-in-out infinite";

      // Click/touch handlers — closure over i
      (function(idx) {
        tile.addEventListener("click", function(){ handleTileClick(idx); });
        tile.addEventListener("touchstart", function(e){
          e.preventDefault();
          handleTileClick(idx);
        }, { passive: false });
      })(i);
    }

    board.appendChild(tile);
  }
}

// ---- Move handling ------------------------------------------
function handleTileClick(idx) {
  if (won) return;
  if (getNeighborIndices(emptyIdx).indexOf(idx) === -1) return;
  TILES[emptyIdx] = TILES[idx];
  TILES[idx] = 0;
  emptyIdx = idx;
  moves++;
  document.getElementById("move-count").textContent = moves;
  setStatus("Move " + moves + " \u2014 keep going!");
  render();
  checkWin();
}

function checkWin() {
  var total = SIZE * SIZE;
  for (var i = 0; i < total - 1; i++) {
    if (TILES[i] !== i + 1) return;
  }
  if (TILES[total - 1] !== 0) return;
  won = true;
  var k = bestKey();
  if (bestScores[k] === undefined || moves < bestScores[k]) {
    bestScores[k] = moves;
    saveBest();
  }
  updateBestDisplay();
  document.getElementById("win-moves").textContent =
    "Completed in " + moves + " move" + (moves === 1 ? "" : "s") + "!";
  document.getElementById("win-overlay").classList.add("visible");
  setStatus("Masterpiece restored \u2014 well done!");
}

// ---- Hint (greedy Manhattan step) ---------------------------
function manhattan(arr) {
  var h = 0;
  for (var i = 0; i < arr.length; i++) {
    var v = arr[i];
    if (v === 0) continue;
    var goalRow = Math.floor((v - 1) / SIZE);
    var goalCol = (v - 1) % SIZE;
    var curRow  = Math.floor(i / SIZE);
    var curCol  = i % SIZE;
    h += Math.abs(goalRow - curRow) + Math.abs(goalCol - curCol);
  }
  return h;
}

function solveStep() {
  if (won) return;
  var nb = getNeighborIndices(emptyIdx);
  var best = null, bestH = Infinity;
  for (var i = 0; i < nb.length; i++) {
    var copy = TILES.slice();
    copy[emptyIdx] = copy[nb[i]];
    copy[nb[i]] = 0;
    var h = manhattan(copy);
    if (h < bestH) { bestH = h; best = nb[i]; }
  }
  if (best !== null) handleTileClick(best);
}

// ---- Game control -------------------------------------------
function startNewGame() {
  won = false;
  moves = 0;
  document.getElementById("move-count").textContent = "0";
  document.getElementById("win-overlay").classList.remove("visible");
  updateBestDisplay();
  var result = solvableShuffle();
  TILES = result.arr;
  emptyIdx = result.eIdx;
  render();
  setStatus("Puzzle shuffled \u2014 slide the pieces into place");
}

function changeSize(n) {
  SIZE = n;
  document.querySelectorAll(".size-btn").forEach(function(b) {
    b.classList.toggle("active", parseInt(b.dataset.size) === n);
  });
  startNewGame();
}

function setStatus(msg) {
  document.getElementById("status-bar").textContent = msg;
}

// ---- Image selector -----------------------------------------
function buildImageSelector() {
  var wrap = document.getElementById("img-selector");
  wrap.innerHTML = "";

  // Built-in image thumbs
  IMAGES.forEach(function(img, i) {
    var btn = document.createElement("div");
    btn.className = "img-thumb" + (i === currentImage ? " active" : "");
    btn.title = img.label;
    var tc = document.createElement("canvas");
    tc.width = 52; tc.height = 52;
    img.draw(tc.getContext("2d"), 52, 52);
    btn.appendChild(tc);
    btn.addEventListener("click", function() {
      currentImage = i;
      drawPreview();
      document.querySelectorAll(".img-thumb, .img-thumb-upload").forEach(function(el, j) {
        el.classList.remove("active");
      });
      btn.classList.add("active");
      startNewGame();
    });
    wrap.appendChild(btn);
  });

  // Upload button
  var uploadBtn = document.createElement("div");
  uploadBtn.className = "img-thumb-upload" + (currentImage === USER_IMG_IDX ? " active" : "");
  uploadBtn.id = "upload-thumb";
  uploadBtn.title = "Upload your own image";

  var icon = document.createElement("div");
  icon.className = "upload-icon";
  icon.textContent = "\u271A"; // ✚

  var lbl = document.createElement("div");
  lbl.className = "upload-label";
  lbl.textContent = "Your\nImage";

  // Thumbnail canvas (shown after image is loaded)
  var thumbC = document.createElement("canvas");
  thumbC.width = 52; thumbC.height = 52;
  thumbC.id = "upload-thumb-canvas";

  uploadBtn.appendChild(icon);
  uploadBtn.appendChild(lbl);
  uploadBtn.appendChild(thumbC);
  wrap.appendChild(uploadBtn);

  // If we already have a user image loaded, draw its thumbnail
  if (userImage) {
    var tc2 = thumbC.getContext("2d");
    var iw = userImage.naturalWidth, ih = userImage.naturalHeight;
    var side = Math.min(iw, ih);
    tc2.drawImage(userImage, (iw-side)/2, (ih-side)/2, side, side, 0, 0, 52, 52);
    uploadBtn.classList.add("has-image");
  }

  // Click: if no image yet, open file picker; if image loaded, select it or re-pick
  uploadBtn.addEventListener("click", function() {
    if (userImage && currentImage === USER_IMG_IDX) {
      // Already selected — re-click opens picker to change
      document.getElementById("img-upload-input").click();
    } else if (userImage) {
      // Image loaded but another preset is active — just switch to it
      selectUserImage();
    } else {
      // No image yet — open picker
      document.getElementById("img-upload-input").click();
    }
  });
}

function selectUserImage() {
  currentImage = USER_IMG_IDX;
  drawPreview();
  document.querySelectorAll(".img-thumb, .img-thumb-upload").forEach(function(el) {
    el.classList.remove("active");
  });
  var ub = document.getElementById("upload-thumb");
  if (ub) ub.classList.add("active");
  startNewGame();
}

// ---- File upload handler ------------------------------------
document.getElementById("img-upload-input").addEventListener("change", function(e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  if (!file.type.match(/^image\//)) {
    setStatus("Please choose an image file (JPG, PNG, GIF, WebP\u2026)");
    return;
  }
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      userImage = img;
      // Draw thumbnail in the upload button canvas
      var thumbC = document.getElementById("upload-thumb-canvas");
      if (thumbC) {
        var tc = thumbC.getContext("2d");
        tc.clearRect(0, 0, 52, 52);
        var iw = img.naturalWidth, ih = img.naturalHeight;
        var side = Math.min(iw, ih);
        tc.drawImage(img, (iw-side)/2, (ih-side)/2, side, side, 0, 0, 52, 52);
      }
      var ub = document.getElementById("upload-thumb");
      if (ub) ub.classList.add("has-image");
      // Auto-select and start game with the new image
      selectUserImage();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  // Reset so same file can be re-selected
  e.target.value = "";
});

// ---- Size button event listeners ----------------------------
document.getElementById("size-selector").addEventListener("click", function(e) {
  var btn = e.target.closest(".size-btn");
  if (!btn) return;
  changeSize(parseInt(btn.dataset.size));
});

// ---- Control button event listeners -------------------------
document.getElementById("btn-shuffle").addEventListener("click", startNewGame);
document.getElementById("btn-hint").addEventListener("click", solveStep);
document.getElementById("btn-win-new").addEventListener("click", startNewGame);

// ---- Keyboard support ---------------------------------------
document.addEventListener("keydown", function(e) {
  if (won) return;
  var eRow = Math.floor(emptyIdx / SIZE);
  var eCol = emptyIdx % SIZE;
  var target = -1;
  if (e.key === "ArrowUp"    && eRow < SIZE - 1) target = emptyIdx + SIZE;
  if (e.key === "ArrowDown"  && eRow > 0)         target = emptyIdx - SIZE;
  if (e.key === "ArrowLeft"  && eCol < SIZE - 1) target = emptyIdx + 1;
  if (e.key === "ArrowRight" && eCol > 0)         target = emptyIdx - 1;
  if (target >= 0) { e.preventDefault(); handleTileClick(target); }
});

// ---- Resize -------------------------------------------------
window.addEventListener("resize", function() {
  if (!won) render();
});

// ---- Init ---------------------------------------------------
document.getElementById("year").textContent = new Date().getFullYear();
// Pre-load Phoenix Art image then build UI
phoenixArtImg = new Image();
phoenixArtImg.onload = function() {
  // Bust the offscreen cache for index 0 so it redraws with the loaded image
  delete offscreenCanvases[0];
  // Redraw thumbnail for Phoenix Art
  var thumbs = document.querySelectorAll(".img-thumb canvas");
  if (thumbs[0]) {
    IMAGES[0].draw(thumbs[0].getContext("2d"), 52, 52);
  }
  if (currentImage === 0) { drawPreview(); render(); }
};
phoenixArtImg.src = PHOENIX_ART_SRC;
buildImageSelector();
drawPreview();
startNewGame();
</script>
