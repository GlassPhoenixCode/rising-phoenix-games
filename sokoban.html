<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Keeper's Vault — Rising Phoenix Games</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(ellipse 90% 55% at 15% 8%,  rgba(90,48,12,0.55) 0%, transparent 58%),
        radial-gradient(ellipse 70% 65% at 85% 90%, rgba(50,25,6,0.6)   0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(30,18,5,0.4)   0%, transparent 70%),
        linear-gradient(160deg, #1c1106 0%, #0f0c07 45%, #13100a 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* ── HEADER ───────────────────────────────────────────────── */
    .game-header {
      background: linear-gradient(180deg, #1e1508 0%, #120e06 100%);
      border-bottom: 2px solid var(--gold);
      box-shadow: 0 4px 24px rgba(0,0,0,0.7), inset 0 1px 0 rgba(200,149,42,0.12);
      flex-shrink: 0;
    }
    .header-inner {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      gap: 12px;
    }
    .header-left {
      flex: 1;
      display: flex;
      justify-content: flex-start;
    }
    .header-center {
      flex: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .header-right {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
    .phoenix-logo {
      width: 44px;
      height: 44px;
      filter: drop-shadow(0 0 8px rgba(200,149,42,0.5));
      flex-shrink: 0;
    }
    h1.game-title {
      font-family: var(--font-display);
      font-size: clamp(16px, 3.5vw, 26px);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 45%, #a07020 80%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      text-align: center;
    }
    .game-subtitle {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 11px;
      color: #c4a46a;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    /* ── LAYOUT ───────────────────────────────────────────────── */
    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 16px;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    /* ── STATUS BAR ───────────────────────────────────────────── */
    .status-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 680px;
    }
    .rpg-statusbar {
      flex: 1;
      min-width: 160px;
      font-size: 12px;
    }
    .stat-value {
      color: #f0d080;
      font-weight: 700;
    }

    /* ── LEVEL SELECTOR ───────────────────────────────────────── */
    .level-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-start;
      margin-bottom: 14px;
    }
    .level-btn {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(200,149,42,0.3);
      background: rgba(200,149,42,0.06);
      color: #b8986a;
      cursor: pointer;
      transition: all 0.15s;
    }
    .level-btn:hover, .level-btn.active {
      background: rgba(200,149,42,0.15);
      border-color: var(--gold);
      color: #f0d080;
      box-shadow: 0 0 8px rgba(200,149,42,0.2);
    }
    .level-btn.active {
      border-color: var(--gold-light);
      background: rgba(200,149,42,0.18);
    }

    /* ── BOARD WRAPPER ────────────────────────────────────────── */
    #board-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CANVAS ───────────────────────────────────────────────── */
    #board {
      display: block;
      border: 2px solid rgba(200,149,42,0.4);
      border-radius: var(--radius);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.8),
        0 8px 40px rgba(0,0,0,0.7),
        0 0 30px 4px rgba(180,120,20,0.12),
        inset 0 0 40px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    /* ── CONTROLS ─────────────────────────────────────────────── */
    .controls-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── D-PAD (mobile) ───────────────────────────────────────── */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 3px;
      margin-top: 8px;
    }
    .dpad-btn {
      background: linear-gradient(180deg, #2a2010 0%, #1a1508 100%);
      border: 1px solid var(--gold);
      border-radius: var(--radius-sm);
      color: #f0d080;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .dpad-btn:hover, .dpad-btn:active {
      background: linear-gradient(180deg, #3a2c14 0%, #241a09 100%);
      border-color: var(--gold-light);
      box-shadow: 0 0 10px rgba(200,149,42,0.3);
      transform: scale(0.95);
    }
    .dpad-btn.empty { border: none; background: transparent; pointer-events: none; }

    /* ── CHRONICLE ────────────────────────────────────────────── */
    .chronicle-wrap {
      width: 100%;
      max-width: 680px;
    }
    .chronicle-label {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chronicle-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .chronicle {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 8px 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(200,149,42,0.15);
      border-radius: var(--radius-sm);
      height: 44px;
      align-items: center;
      scrollbar-width: thin;
    }
    .chronicle-pill {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(200,149,42,0.08);
      border: 1px solid rgba(200,149,42,0.2);
      color: #b8986a;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chronicle-pill.good { background: rgba(60,140,40,0.12); border-color: rgba(80,180,60,0.3); color: #8adc6a; }
    .chronicle-pill.push { background: rgba(180,120,20,0.12); border-color: rgba(200,149,42,0.3); color: #f0d080; }

    /* ── VICTORY OVERLAY ──────────────────────────────────────── */
    #victory-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
    }
    #victory-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(160deg, #261c0a 0%, #1a1005 100%);
      border: 2px solid var(--gold);
      border-radius: var(--radius-lg);
      padding: 24px 40px;
      text-align: center;
      box-shadow:
        0 0 60px rgba(200,149,42,0.5),
        0 0 120px rgba(180,120,10,0.25),
        inset 0 0 30px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    #victory-msg h2 {
      font-family: var(--font-display);
      font-size: clamp(20px, 4vw, 32px);
      margin: 0 0 6px 0;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
    }
    #victory-msg p {
      font-family: var(--font-body);
      font-style: italic;
      color: #c8a878;
      font-size: 14px;
      margin: 0;
    }
    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── FOOTER ───────────────────────────────────────────────── */
    footer {
      padding: 10px 20px 14px;
      border-top: 1px solid rgba(200,149,42,0.1);
      font-family: var(--font-body);
      font-style: italic;
      font-size: 11px;
      color: rgba(180,150,90,0.65);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
    }

    @media (max-width: 500px) {
      .header-inner { padding: 10px 14px; }
      .game-title { font-size: 15px; }
    }
  </style>
</head>

<!-- ── MAIN ─────────────────────────────────────────────────── -->
<main id="app">

  <!-- Status -->
  <div class="status-row">
    <div class="rpg-statusbar">⚜ &nbsp; Level <span class="stat-value" id="ui-level">1</span>
      &nbsp;·&nbsp; Moves <span class="stat-value" id="ui-moves">0</span>
      &nbsp;·&nbsp; Pushes <span class="stat-value" id="ui-pushes">0</span>
    </div>
    <button class="rpg-btn" id="btn-undo" onclick="undoMove()">↩ Undo</button>
    <button class="rpg-btn" id="btn-restart" onclick="restartLevel()">↺ Restart</button>
  </div>

  <!-- Board -->
  <div id="board-wrapper">
    <canvas id="board"></canvas>
  </div>

  <!-- D-pad (visible on touch) -->
  <div class="dpad" id="dpad">
    <div class="dpad-btn empty"></div>
    <button class="dpad-btn" onclick="move(0,-1)" aria-label="Up">▲</button>
    <div class="dpad-btn empty"></div>
    <button class="dpad-btn" onclick="move(-1,0)" aria-label="Left">◀</button>
    <button class="dpad-btn empty" style="pointer-events:none"></button>
    <button class="dpad-btn" onclick="move(1,0)" aria-label="Right">▶</button>
    <div class="dpad-btn empty"></div>
    <button class="dpad-btn" onclick="move(0,1)" aria-label="Down">▼</button>
    <div class="dpad-btn empty"></div>
  </div>

  <!-- Chronicle -->
  <div class="chronicle-wrap">

  <!-- Level picker -->
  <div class="chronicle-label">Levels</div>
  <div class="level-row" id="level-row"></div>

  <br>
  
    <div class="chronicle-label">Chronicle</div>
    <div class="chronicle" id="chronicle"></div>
  </div>

</main>

<!-- ── FOOTER ───────────────────────────────────────────────── -->

</div>

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let currentLevel = 0;
let grid = [];
let playerPos = {x:0, y:0};
let moves = 0, pushes = 0;
let history = [];   // for undo: [{grid, px, py, moves, pushes}]
let won = false;

// ═══════════════════════════════════════════════════
//  PARSE LEVEL
// ═══════════════════════════════════════════════════
function parseLevel(idx) {
  const def = LEVELS[idx];
  const rows = def.grid;
  const h = rows.length;
  const w = Math.max(...rows.map(r => r.length));
  const g = [];
  let px = 0, py = 0;

  for (let y = 0; y < h; y++) {
    const row = [];
    for (let x = 0; x < w; x++) {
      const ch = (rows[y][x] || ' ');
      if (ch === '#') row.push(WALL);
      else if (ch === '.') row.push(TARGET);
      else if (ch === '$') row.push(BOX);
      else if (ch === '*') row.push(BOX_ON);
      else if (ch === '@') { row.push(PLAYER); px = x; py = y; }
      else if (ch === '+') { row.push(PLAY_ON); px = x; py = y; }
      else row.push(FLOOR);
    }
    g.push(row);
  }
  return { grid: g, px, py, w, h };
}

// ═══════════════════════════════════════════════════
//  CANVAS & DRAWING
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let TILE = 56;
let GW = 0, GH = 0;

function computeTileSize(w, h) {
  const maxW = Math.min(window.innerWidth - 40, 680);
  const maxH = window.innerHeight * 0.45;
  return Math.floor(Math.min(maxW / w, maxH / h, 64));
}

function setupCanvas(w, h) {
  TILE = computeTileSize(w, h);
  canvas.width  = w * TILE;
  canvas.height = h * TILE;
  GW = w; GH = h;
}

function drawTile(x, y, tile) {
  const px = x * TILE, py = y * TILE;

  // Background
  if (tile === WALL) {
    // Stone wall — bright warm stone, high contrast
    const wg = ctx.createLinearGradient(px, py, px + TILE, py + TILE);
    wg.addColorStop(0,   '#7a5c2e');
    wg.addColorStop(0.4, '#5e4420');
    wg.addColorStop(1,   '#3d2c10');
    ctx.fillStyle = wg;
    ctx.fillRect(px, py, TILE, TILE);

    // Mortar lines (dark gaps between bricks)
    const brickH = Math.max(4, TILE / 3);
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 2;
    for (let row = 0; row < 3; row++) {
      const offset = row % 2 === 0 ? 0 : TILE / 2;
      ctx.strokeRect(px + offset - TILE / 2, py + row * brickH, TILE, brickH);
    }

    // Highlight top edge of each brick for 3-D depth
    ctx.fillStyle = 'rgba(255,220,140,0.18)';
    ctx.fillRect(px, py, TILE, 2);
    for (let row = 0; row < 3; row++) {
      ctx.fillStyle = 'rgba(255,210,120,0.12)';
      ctx.fillRect(px, py + row * brickH + 1, TILE, 2);
    }

    // Left-edge highlight
    ctx.fillStyle = 'rgba(255,200,100,0.1)';
    ctx.fillRect(px, py, 2, TILE);

    // Gold border glow on outer faces
    ctx.strokeStyle = 'rgba(200,149,42,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
    return;
  }

  // Floor
  const floorG = ctx.createLinearGradient(px, py, px + TILE, py + TILE);
  if (tile === TARGET || tile === BOX_ON || tile === PLAY_ON) {
    floorG.addColorStop(0, '#201808');
    floorG.addColorStop(1, '#150f05');
  } else {
    floorG.addColorStop(0, '#1a1208');
    floorG.addColorStop(1, '#100d05');
  }
  ctx.fillStyle = floorG;
  ctx.fillRect(px, py, TILE, TILE);

  // Grid lines
  ctx.strokeStyle = 'rgba(200,149,42,0.06)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);

  // Target marker
  if (tile === TARGET || tile === BOX_ON || tile === PLAY_ON) {
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = '#c8952a';
    ctx.lineWidth = 2;
    const cx2 = px + TILE/2, cy2 = py + TILE/2;
    const r = Math.max(2, TILE * 0.28);
    ctx.beginPath();
    ctx.arc(cx2, cy2, r, 0, Math.PI * 2);
    ctx.stroke();
    // Inner dot
    ctx.fillStyle = '#c8952a';
    ctx.beginPath();
    ctx.arc(cx2, cy2, 4, 0, Math.PI * 2);
    ctx.fill();
    // Corner ticks
    const t = TILE * 0.1;
    [[px+t, py+t],[px+TILE-t, py+t],[px+t, py+TILE-t],[px+TILE-t, py+TILE-t]].forEach(([tx,ty]) => {
      ctx.beginPath();
      ctx.moveTo(tx, py + t);
      ctx.lineTo(tx, ty);
      ctx.lineTo(px + t + (tx > px + TILE/2 ? TILE - 2*t : 0), ty);
      ctx.stroke();
    });
    ctx.restore();
  }

  // Box
  if (tile === BOX || tile === BOX_ON) {
    const m = TILE * 0.1;
    const bx = px + m, by = py + m, bs = TILE - 2*m;
    const isOn = tile === BOX_ON;

    // Body
    const bg = ctx.createLinearGradient(bx, by, bx + bs, by + bs);
    if (isOn) {
      bg.addColorStop(0, '#5a3a10');
      bg.addColorStop(0.5, '#3a2408');
      bg.addColorStop(1, '#2a1a06');
    } else {
      bg.addColorStop(0, '#4a3010');
      bg.addColorStop(0.5, '#2e1e08');
      bg.addColorStop(1, '#1e1406');
    }
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.roundRect(bx, by, bs, bs, 4);
    ctx.fill();

    // Border
    ctx.strokeStyle = isOn ? '#c8952a' : '#8a6818';
    ctx.lineWidth = isOn ? 2 : 1.5;
    ctx.stroke();

    // Cross straps
    ctx.strokeStyle = isOn ? 'rgba(200,149,42,0.5)' : 'rgba(140,100,24,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bx + bs * 0.5, by + 4);
    ctx.lineTo(bx + bs * 0.5, by + bs - 4);
    ctx.moveTo(bx + 4, by + bs * 0.5);
    ctx.lineTo(bx + bs - 4, by + bs * 0.5);
    ctx.stroke();

    // Glow if on target
    if (isOn) {
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.shadowColor = '#c8952a';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#f0d080';
      ctx.lineWidth = 2;
      ctx.strokeRect(bx, by, bs, bs);
      ctx.restore();
    }

    // Corner rivets
    const rv = 3, rvs = [[bx+rv, by+rv],[bx+bs-rv, by+rv],[bx+rv, by+bs-rv],[bx+bs-rv, by+bs-rv]];
    ctx.fillStyle = isOn ? '#f0d080' : '#8a6818';
    rvs.forEach(([rx, ry]) => {
      ctx.beginPath();
      ctx.arc(rx, ry, 2, 0, Math.PI * 2);
      ctx.fill();
    });
    return;
  }

  // Player
  if (tile === PLAYER || tile === PLAY_ON) {
    const cx2 = px + TILE/2, cy2 = py + TILE/2;
    const now = Date.now() / 1000;
    const maxBob = Math.max(0, TILE * 0.05);
    const bob = Math.sin(now * 2.5) * Math.min(1.5, maxBob);

    // Cloak shadow
    const shadowRx = Math.max(1, TILE*0.22), shadowRy = Math.max(1, TILE*0.08);
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.ellipse(cx2, cy2 + TILE*0.32 + bob*0.3, shadowRx, shadowRy, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Cloak body
    const cloakRx = Math.max(1, TILE*0.28), cloakRy = Math.max(1, TILE*0.35);
    const cg = ctx.createRadialGradient(cx2, cy2 - TILE*0.05 + bob, 1, cx2, cy2 + bob, Math.max(1, TILE*0.32));
    cg.addColorStop(0, '#8a3010');
    cg.addColorStop(0.6, '#5a1a08');
    cg.addColorStop(1, '#2a0a04');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx2, cy2 + bob*0.5, cloakRx, cloakRy, 0, 0, Math.PI*2);
    ctx.fill();

    // Head glow (lantern light)
    const headY = cy2 - Math.max(0, TILE*0.14) + bob;
    const glowR = Math.max(1, TILE*0.18);
    const headR = Math.max(1, TILE*0.15);
    const headSmR = Math.max(1, TILE*0.11);
    const headG = ctx.createRadialGradient(cx2, headY, 1, cx2, headY, glowR);
    headG.addColorStop(0, '#f0d080');
    headG.addColorStop(0.5, '#c8952a');
    headG.addColorStop(1, 'rgba(200,149,42,0)');
    ctx.fillStyle = headG;
    ctx.beginPath();
    ctx.arc(cx2, headY, headR, 0, Math.PI*2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#d4a060';
    ctx.beginPath();
    ctx.arc(cx2, headY, headSmR, 0, Math.PI*2);
    ctx.fill();

    // Gold trim
    ctx.strokeStyle = '#f0d080';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx2, headY, headSmR, 0, Math.PI*2);
    ctx.stroke();
  }
}

function render() {
  if (!grid.length) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < grid.length; y++) {
    for (let x = 0; x < grid[y].length; x++) {
      drawTile(x, y, grid[y][x]);
    }
  }

  // Request next frame for player bob animation
  if (!won) requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════
function isBox(t) { return t === BOX || t === BOX_ON; }
function isTarget(t) { return t === TARGET || t === BOX_ON || t === PLAY_ON; }

function cloneGrid(g) { return g.map(r => [...r]); }

function move(dx, dy) {
  if (won) return;
  const nx = playerPos.x + dx;
  const ny = playerPos.y + dy;

  if (ny < 0 || ny >= grid.length || nx < 0 || nx >= grid[0].length) return;
  const dest = grid[ny][nx];
  if (dest === WALL) return;

  let pushed = false;

  if (isBox(dest)) {
    const bnx = nx + dx, bny = ny + dy;
    if (bny < 0 || bny >= grid.length || bnx < 0 || bnx >= grid[0].length) return;
    const boxDest = grid[bny][bnx];
    if (boxDest === WALL || isBox(boxDest)) return;

    // Save history before mutating
    history.push({ grid: cloneGrid(grid), px: playerPos.x, py: playerPos.y, moves, pushes });

    // Move box
    grid[bny][bnx] = (boxDest === TARGET) ? BOX_ON : BOX;
    pushed = true;
    pushes++;
  } else {
    history.push({ grid: cloneGrid(grid), px: playerPos.x, py: playerPos.y, moves, pushes });
  }

  // Clear player from current
  const curTile = grid[playerPos.y][playerPos.x];
  grid[playerPos.y][playerPos.x] = (curTile === PLAY_ON) ? TARGET : FLOOR;

  // Clear box from dest if pushed
  if (pushed) {
    // dest was BOX or BOX_ON — floor beneath is FLOOR or TARGET
    // we already stored box at bny,bnx; dest tile (ny,nx) becomes where player lands
    const beneath = (dest === BOX_ON) ? TARGET : FLOOR;
    grid[ny][nx] = (beneath === TARGET) ? PLAY_ON : PLAYER;
  } else {
    grid[ny][nx] = (dest === TARGET) ? PLAY_ON : PLAYER;
  }

  playerPos = {x: nx, y: ny};
  moves++;
  updateUI();
  addChronicle(pushed ? 'push' : 'step', pushed);
  checkWin();
}

function undoMove() {
  if (!history.length) return;
  won = false;
  const s = history.pop();
  grid = s.grid;
  playerPos = {x: s.px, y: s.py};
  moves = s.moves;
  pushes = s.pushes;
  updateUI();
  if (!won) render();
}

function checkWin() {
  // Win if no unresolved boxes remain
  for (let y = 0; y < grid.length; y++) {
    for (let x = 0; x < grid[y].length; x++) {
      if (grid[y][x] === BOX) return; // unfilled box found
    }
  }
  won = true;
  setTimeout(showVictory, 200);
}

function loadLevel(idx) {
  currentLevel = idx;
  const parsed = parseLevel(idx);
  grid = parsed.grid;
  playerPos = {x: parsed.px, y: parsed.py};
  moves = 0; pushes = 0;
  history = [];
  won = false;

  setupCanvas(parsed.w, parsed.h);
  updateUI();
  updateLevelButtons();
  chronicle([]);
  addChronicle('started', false, LEVELS[idx].name);
  render();
}

function restartLevel() {
  won = false;
  loadLevel(currentLevel);
}

function updateUI() {
  document.getElementById('ui-level').textContent  = currentLevel + 1;
  document.getElementById('ui-moves').textContent  = moves;
  document.getElementById('ui-pushes').textContent = pushes;
}

function updateLevelButtons() {
  document.querySelectorAll('.level-btn').forEach((b, i) => {
    b.classList.toggle('active', i === currentLevel);
  });
}

// ═══════════════════════════════════════════════════
//  CHRONICLE
// ═══════════════════════════════════════════════════
const pills = [];
function chronicle(arr) {
  pills.length = 0;
  document.getElementById('chronicle').innerHTML = '';
}

function addChronicle(type, isPush, label) {
  const el = document.getElementById('chronicle');
  const pill = document.createElement('div');
  pill.className = 'chronicle-pill' + (type === 'started' ? '' : isPush ? ' push' : '');

  if (type === 'started') pill.textContent = '▶ ' + label;
  else if (isPush)        pill.textContent = '📦 Push #' + pushes;
  else                    pill.textContent = 'Move ' + moves;

  el.appendChild(pill);
  el.scrollLeft = el.scrollWidth;
}

// ═══════════════════════════════════════════════════
//  VICTORY
// ═══════════════════════════════════════════════════
function showVictory() {
  addChronicle('win', false);
  launchConfetti();

  const overlay = document.getElementById('victory-overlay');
  const msg = document.getElementById('victory-msg');
  const detail = document.getElementById('victory-detail');

  detail.textContent = `Sealed in ${moves} moves, ${pushes} pushes. The keeper is pleased.`;
  overlay.style.display = 'block';

  // Get puzzle bounds to set max-width
  const boardRect = canvas.getBoundingClientRect();
  msg.style.maxWidth = boardRect.width + 'px';
  msg.style.width = boardRect.width + 'px';

  // Animate: scale 0 → 1 over 0.75s, hold 1s, then fade out
  let start = null;
  function animMsg(ts) {
    if (!start) start = ts;
    const elapsed = ts - start;
    if (elapsed < 750) {
      const t = elapsed / 750;
      const ease = 1 - Math.pow(1 - t, 3);
      msg.style.transform = `translate(-50%, -50%) scale(${ease})`;
      msg.style.opacity = '1';
      requestAnimationFrame(animMsg);
    } else {
      msg.style.transform = 'translate(-50%, -50%) scale(1)';
      // Hold 1 second then fade
      setTimeout(() => {
        let fo = null;
        function fadeOut(ts2) {
          if (!fo) fo = ts2;
          const e2 = ts2 - fo;
          if (e2 < 400) {
            msg.style.opacity = String(1 - e2/400);
            requestAnimationFrame(fadeOut);
          } else {
            overlay.style.display = 'none';
            msg.style.opacity = '1';
            msg.style.transform = 'translate(-50%, -50%) scale(0)';
            // Auto-advance to next level
            if (currentLevel < LEVELS.length - 1) {
              setTimeout(() => loadLevel(currentLevel + 1), 400);
            }
          }
        }
        requestAnimationFrame(fadeOut);
      }, 1000);
    }
  }
  requestAnimationFrame(animMsg);
}

// ═══════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════
function launchConfetti() {
  const cc = document.getElementById('confetti-canvas');
  cc.width  = window.innerWidth;
  cc.height = window.innerHeight;
  const cx  = cc.getContext('2d');

  const COLORS = ['#f0d080','#c8952a','#ff8040','#40d080','#8080ff','#ff4060','#ffffff','#ffcc00'];
  const particles = [];

  // Burst from several points
  const burstPoints = [
    {x: cc.width * 0.2, y: cc.height * 0.4},
    {x: cc.width * 0.5, y: cc.height * 0.3},
    {x: cc.width * 0.8, y: cc.height * 0.4},
    {x: cc.width * 0.35, y: cc.height * 0.55},
    {x: cc.width * 0.65, y: cc.height * 0.5}
  ];

  burstPoints.forEach((bp, bi) => {
    const delay = bi * 80;
    for (let i = 0; i < 30; i++) {
      const angle = (Math.random() * Math.PI * 2);
      const speed = 3 + Math.random() * 8;
      particles.push({
        x: bp.x, y: bp.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 3,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        size: 4 + Math.random() * 7,
        shape: Math.random() < 0.5 ? 'rect' : 'circle',
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.3,
        life: 1,
        decay: 0.008 + Math.random() * 0.012,
        delay
      });
    }
  });

  let startT = null;
  function animConfetti(ts) {
    if (!startT) startT = ts;
    const elapsed = ts - startT;
    cx.clearRect(0, 0, cc.width, cc.height);

    let alive = false;
    particles.forEach(p => {
      if (elapsed < p.delay) { alive = true; return; }
      if (p.life <= 0) return;
      alive = true;
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.18;      // gravity
      p.vx *= 0.99;
      p.rot += p.rotV;
      p.life -= p.decay;

      cx.save();
      cx.globalAlpha = Math.max(0, p.life);
      cx.fillStyle = p.color;
      cx.translate(p.x, p.y);
      cx.rotate(p.rot);
      if (p.shape === 'rect') {
        cx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      } else {
        cx.beginPath();
        cx.arc(0, 0, p.size/2, 0, Math.PI*2);
        cx.fill();
      }
      cx.restore();
    });

    if (alive) requestAnimationFrame(animConfetti);
    else cx.clearRect(0, 0, cc.width, cc.height);
  }
  requestAnimationFrame(animConfetti);
}

// ═══════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') { e.preventDefault(); move(0,-1); }
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') { e.preventDefault(); move(0, 1); }
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { e.preventDefault(); move(-1,0); }
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault(); move(1, 0); }
  if (e.key === 'z' || e.key === 'Z' || e.key === 'u' || e.key === 'U') { e.preventDefault(); undoMove(); }
  if (e.key === 'r' || e.key === 'R') restartLevel();
});

// ═══════════════════════════════════════════════════
//  TOUCH / SWIPE
// ═══════════════════════════════════════════════════
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive: true});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (Math.max(adx, ady) < 20) return;
  if (adx > ady) move(dx > 0 ? 1 : -1, 0);
  else           move(0, dy > 0 ? 1 : -1);
  touchStart = null;
}, {passive: true});

// ═══════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════
window.addEventListener('resize', () => {
  if (!grid.length) return;
  const parsed = parseLevel(currentLevel);
  setupCanvas(parsed.w, parsed.h);
});

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
function init() {
  // Build level buttons
  const row = document.getElementById('level-row');
  LEVELS.forEach((lv, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-btn' + (i === 0 ? ' active' : '');
    btn.textContent = `${i+1}. ${lv.name}`;
    btn.onclick = () => loadLevel(i);
    row.appendChild(btn);
  });

  loadLevel(0);
}

document.getElementById('year').textContent = new Date().getFullYear();
init();
</script>
</body>
